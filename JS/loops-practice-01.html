<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop Practice 01</title>

    <script>
        // Print numbers from 1 to 50.
        for (let i = 1; i <= 50; i++){
            console.log(i);
        }

        // Print even numbers from 1 to 50.
        for (let j = 1; j <= 50; j++){
            if (j % 2 === 0){
                console.log(j);
            }
        }

        for (let k = 2; k <= 50; k += 2){
            console.log(k);
        }

        // Print odd numbers from 1 to 50.
        for (let a = 1; a <= 50; a++){
            if(a & 2 != 0){
                console.log(a);
            }
        }

        // Print multiples of 5 till 100.
        for(let b = 5; b <= 100; b+=5){
            console.log(b);
        }

        // Print multiples of 3 till 30.
        for(c = 3; c <= 30; c += 3){
            console.log(c);
        }
    </script>
</head>
<body>
    <h1>For Loop Practice 01</h1>
</body>
</html>
